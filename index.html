<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約状況カレンダー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; padding: 20px; }
    h1 { text-align: center; color: #333; margin-bottom: 20px; font-size: 20px; }

    .nav { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; }
    .nav button { background: #4CAF50; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 16px; }
    .nav span { font-size: 18px; font-weight: bold; color: #333; }

    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .day-header { text-align: center; font-weight: bold; padding: 8px; font-size: 12px; color: #666; }
    .day-header.sun { color: #e53935; }
    .day-header.sat { color: #1565c0; }

    .day { background: white; border-radius: 8px; padding: 8px; min-height: 80px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
    .day:hover { border-color: #4CAF50; }
    .day.empty { background: transparent; cursor: default; }
    .day.empty:hover { border-color: transparent; }
    .day.today { border-color: #FF9800; }

    .day-num { font-size: 14px; font-weight: bold; color: #333; }
    .day-num.sun { color: #e53935; }
    .day-num.sat { color: #1565c0; }

    .status { margin-top: 4px; text-align: center; font-size: 11px; padding: 2px 4px; border-radius: 4px; }
    .status.open { background: #e8f5e9; color: #2e7d32; }
    .status.full { background: #ffebee; color: #c62828; }
    .time-list { margin-top: 2px; font-size: 10px; color: #c62828; text-align: center; }

    .detail { margin-top: 20px; background: white; border-radius: 8px; padding: 16px; }
    .detail h2 { font-size: 16px; margin-bottom: 12px; color: #333; border-bottom: 2px solid #4CAF50; padding-bottom: 8px; }
    .booking { background: #f9f9f9; border-radius: 6px; padding: 10px; margin-bottom: 8px; font-size: 13px; border-left: 4px solid #4CAF50; }
    .booking p { margin: 3px 0; color: #555; }
    .no-booking { color: #999; text-align: center; padding: 20px; }

    /* 管理者ログイン */
    .admin-bar { text-align: right; margin-bottom: 10px; }
    .admin-bar button { background: #607D8B; color: white; border: none; padding: 6px 14px; border-radius: 16px; cursor: pointer; font-size: 12px; }
    .admin-bar span { font-size: 12px; color: #2e7d32; margin-right: 8px; }

    .login-box { background: white; border-radius: 8px; padding: 16px; margin-bottom: 16px; text-align: center; display: none; }
    .login-box input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; margin-right: 8px; font-size: 14px; }
    .login-box button { background: #4CAF50; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .login-error { color: red; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>📅 予約状況カレンダー</h1>

  <!-- 管理者バー -->
  <div class="admin-bar">
    <span id="adminLabel" style="display:none;">🔑 管理者モード</span>
    <button id="adminBtn" onclick="toggleLogin()">管理者ログイン</button>
  </div>

  <!-- ログインボックス -->
  <div class="login-box" id="loginBox">
    <input type="password" id="passwordInput" placeholder="パスワードを入力" />
    <button onclick="checkPassword()">ログイン</button>
    <div class="login-error" id="loginError"></div>
  </div>

  <div class="nav">
    <button onclick="changeMonth(-1)">◀</button>
    <span id="monthLabel"></span>
    <button onclick="changeMonth(1)">▶</button>
  </div>

  <div class="calendar" id="calendar">
    <div style="text-align:center;padding:40px;color:#999;">読み込み中...</div>
  </div>

  <div class="detail" id="detail" style="display:none;">
    <h2 id="detailTitle"></h2>
    <div id="detailContent"></div>
  </div>

  <script>
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let bookings = [];
    let isAdmin = false;

    // ===== パスワード設定（ここを変更！） =====
    const ADMIN_PASSWORD = 'Zaq1234567890-';

    google.script.run
      .withSuccessHandler(function(data) {
        bookings = data || [];
        renderCalendar();
      })
      .withFailureHandler(function(err) {
        document.getElementById('calendar').innerHTML =
          '<p style="color:red;padding:20px;">エラー：' + err.message + '</p>';
      })
      .getBookings();

    function toggleLogin() {
      const box = document.getElementById('loginBox');
      if (isAdmin) {
        // ログアウト
        isAdmin = false;
        document.getElementById('adminLabel').style.display = 'none';
        document.getElementById('adminBtn').textContent = '管理者ログイン';
        document.getElementById('detail').style.display = 'none';
        renderCalendar();
      } else {
        box.style.display = box.style.display === 'none' ? 'block' : 'none';
      }
    }

    function checkPassword() {
      const input = document.getElementById('passwordInput').value;
      if (input === ADMIN_PASSWORD) {
        isAdmin = true;
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminLabel').style.display = 'inline';
        document.getElementById('adminBtn').textContent = 'ログアウト';
        document.getElementById('passwordInput').value = '';
        document.getElementById('loginError').textContent = '';
        renderCalendar();
      } else {
        document.getElementById('loginError').textContent = 'パスワードが違います';
      }
    }

    function changeMonth(dir) {
      currentMonth += dir;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
      renderCalendar();
      document.getElementById('detail').style.display = 'none';
    }

    function renderCalendar() {
      const label = currentYear + '年' + (currentMonth + 1) + '月';
      document.getElementById('monthLabel').textContent = label;

      const cal = document.getElementById('calendar');
      cal.innerHTML = '';

      const headers = ['日','月','火','水','木','金','土'];
      const headerClasses = ['sun','','','','','','sat'];
      headers.forEach(function(h, i) {
        const div = document.createElement('div');
        div.className = 'day-header ' + headerClasses[i];
        div.textContent = h;
        cal.appendChild(div);
      });

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
      const today = new Date();

      for (let i = 0; i < firstDay; i++) {
        const div = document.createElement('div');
        div.className = 'day empty';
        cal.appendChild(div);
      }

      for (let d = 1; d <= lastDate; d++) {
        const dateStr = currentYear + '/' +
          String(currentMonth + 1).padStart(2, '0') + '/' +
          String(d).padStart(2, '0');

        const dayBookings = bookings.filter(function(b) { return b.date === dateStr; });
        const isToday = today.getFullYear() === currentYear &&
                        today.getMonth() === currentMonth &&
                        today.getDate() === d;

        const dow = new Date(currentYear, currentMonth, d).getDay();
        const div = document.createElement('div');
        div.className = 'day' + (isToday ? ' today' : '');

        (function(ds, db) {
          div.addEventListener('click', function() { showDetail(ds, db); });
        })(dateStr, dayBookings);

        const numClass = dow === 0 ? 'sun' : (dow === 6 ? 'sat' : '');
        let html = '<div class="day-num ' + numClass + '">' + d + '</div>';

        if (dayBookings.length > 0) {
          html += '<div class="status full">🔴 ' + dayBookings.length + '件</div>';
          const timeList = dayBookings.map(function(b) { return b.time; }).join(' / ');
          html += '<div class="time-list">' + timeList + '</div>';
        } else {
          html += '<div class="status open">🟢 空き</div>';
        }

        div.innerHTML = html;
        cal.appendChild(div);
      }
    }

    function showDetail(dateStr, dayBookings) {
      const detail = document.getElementById('detail');
      document.getElementById('detailTitle').textContent = dateStr + ' の予約';
      const content = document.getElementById('detailContent');

      if (dayBookings.length === 0) {
        content.innerHTML = '<div class="no-booking">予約はありません</div>';
      } else {
        content.innerHTML = dayBookings.map(function(b) {
          if (isAdmin) {
            // 管理者：全情報表示
            return '<div class="booking">' +
              '<p>👤 ' + b.name + ' 様</p>' +
              '<p>🕐 ' + b.time + '</p>' +
              '<p>📞 ' + b.phone + '</p>' +
              '<p>📧 ' + b.email + '</p>' +
              '<p>📝 ' + (b.memo || 'なし') + '</p>' +
              '</div>';
          } else {
            // お客さん：時間のみ表示
            return '<div class="booking">' +
              '<p>🕐 ' + b.time + ' 予約済み</p>' +
              '</div>';
          }
        }).join('');
      }

      detail.style.display = 'block';
      detail.scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
